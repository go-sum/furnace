version: '3'

vars:
  CURRENT_VERSION:
    sh: git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' | grep . || echo "0.1.0"

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmd: task --list

  git:version:
    desc: "Bump patch version and tag if changes since last release"
    cmds:
      - task: _bump
        vars: { PART: patch }

  git:minor:
    desc: "Bump minor version and tag if changes since last release"
    cmds:
      - task: _bump
        vars: { PART: minor }

  git:major:
    desc: "Bump major version and tag if changes since last release"
    cmds:
      - task: _bump
        vars: { PART: major }

  git:release:
    desc: "Push commits and latest tag to origin"
    preconditions:
      - sh: git describe --tags --abbrev=0 2>/dev/null | grep .
        msg: "No tag found — run git:version, git:minor, or git:major first"
    cmds:
      - git push
      - git push origin "$(git describe --tags --abbrev=0)"

  _bump:
    internal: true
    cmds:
      - |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
        if [ -n "$LAST_TAG" ]; then
          COUNT=$(git log "$LAST_TAG..HEAD" --oneline | wc -l | tr -d '[:space:]')
          if [ "$COUNT" -eq 0 ]; then
            echo "No changes since $LAST_TAG" >&2
            exit 1
          fi
        fi
        if [ -z "$LAST_TAG" ]; then
          NEW="v0.1.0"
        else
          VERSION=$(echo "$LAST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "{{.PART}}" in
            patch) NEW="v$MAJOR.$MINOR.$((PATCH + 1))" ;;
            minor) NEW="v$MAJOR.$((MINOR + 1)).0" ;;
            major) NEW="v$((MAJOR + 1)).0.0" ;;
          esac
        fi
        git tag "$NEW"
        echo "Tagged $NEW"
