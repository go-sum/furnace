name: GHCR Publish

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish, e.g. v0.1.23
        required: true
        type: string
      image_repo:
        description: OCI image repo
        required: false
        default: ghcr.io/go-sum/furnace-web
        type: string
      compose_repo:
        description: OCI compose artifact repo
        required: false
        default: ghcr.io/go-sum/furnace-web
        type: string
      compose_dir:
        description: Compose directory
        required: false
        default: docker/compose
        type: string
      push_latest:
        description: Also push latest tag
        required: false
        default: false
        type: boolean
    outputs:
      manifest-name:
        description: Uploaded manifest artifact name
        value: ${{ jobs.publish.outputs.manifest-name }}
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, e.g. v0.1.23
        required: true
        type: string
      image_repo:
        description: OCI image repo
        required: false
        default: ghcr.io/go-sum/furnace-web
        type: string
      compose_repo:
        description: OCI compose artifact repo
        required: false
        default: ghcr.io/go-sum/furnace-web
        type: string
      compose_dir:
        description: Compose directory
        required: false
        default: docker/compose
        type: string
      push_latest:
        description: Also push latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      manifest-name: ${{ steps.meta.outputs.manifest_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: oras-project/setup-oras@v2.0.0
        with:
          version: 1.3.0

      - uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v3.0.6

      - name: Set manifest name
        id: meta
        run: echo "manifest_name=ghcr-publish-${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Publish and verify
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          args=(
            --tag "${{ inputs.tag }}"
            --image-repo "${{ inputs.image_repo }}"
            --compose-repo "${{ inputs.compose_repo }}"
            --compose-dir "${{ inputs.compose_dir }}"
            --github-workflow-ref "${{ github.ref }}"
            --output "${{ steps.meta.outputs.manifest_name }}.json"
          )
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            args+=(--push-latest)
          fi
          bash bin/ghcr-publish.sh "${args[@]}"

      - name: Upload publish manifest
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.meta.outputs.manifest_name }}
          path: ${{ steps.meta.outputs.manifest_name }}.json
          if-no-files-found: error
