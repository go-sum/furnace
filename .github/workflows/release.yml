name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # upload release assets
  id-token: write   # OIDC token for Sigstore keyless signing
  packages: write   # push OCI artifacts to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/go-sum/furnace/internal/cli.Version=${{ github.ref_name }}" \
            -o furnace-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/furnace

      - name: Sign binary
        run: |
          cosign sign-blob --yes \
            --bundle furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle \
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle

  compose-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oras-project/setup-oras@v2.0.0
        with:
          version: 1.3.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Log in to GHCR
        run: |
          for i in 1 2 3 4 5; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              exit 0
            fi
            sleep $((i * 5))
          done
          exit 1

      - name: Push compose artifact
        run: |
          oras push "ghcr.io/go-sum/furnace-web:${{ github.ref_name }}-compose" \
            --artifact-type application/vnd.furnace.compose \
            docker/compose/docker-compose.yml:application/yaml

      - name: Sign compose artifact
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          DIGEST=$(oras manifest fetch --descriptor \
            "ghcr.io/go-sum/furnace-web:${{ github.ref_name }}-compose" | jq -r '.digest')
          cosign sign --yes --new-bundle-format --registry-referrers-mode=oci-1-1 "ghcr.io/go-sum/furnace-web@${DIGEST}"

      - name: Verify compose signature publication
        run: |
          DIGEST=$(oras manifest fetch --descriptor \
            "ghcr.io/go-sum/furnace-web:${{ github.ref_name }}-compose" | jq -r '.digest')
          COUNT=$(oras discover \
            --distribution-spec v1.1-referrers-api \
            --artifact-type application/vnd.dev.sigstore.bundle.v0.3+json \
            --format json \
            --depth 1 \
            "ghcr.io/go-sum/furnace-web@${DIGEST}" | jq '(.referrers // .manifests // []) | length')
          test "${COUNT}" -ge 1

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        run: |
          for i in 1 2 3 4 5; do
            if echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
              exit 0
            fi
            sleep $((i * 5))
          done
          exit 1

      - uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=furnace-web-release
          cache-to: type=gha,scope=furnace-web-release,mode=max
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/go-sum/furnace-web:${{ github.ref_name }}
            ghcr.io/go-sum/furnace-web:latest

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: cosign sign --yes --recursive --new-bundle-format --registry-referrers-mode=oci-1-1 "ghcr.io/go-sum/furnace-web@${{ steps.build.outputs.digest }}"

      - name: Verify image signature publication
        run: |
          COUNT=$(oras discover \
            --distribution-spec v1.1-referrers-api \
            --artifact-type application/vnd.dev.sigstore.bundle.v0.3+json \
            --format json \
            --depth 1 \
            "ghcr.io/go-sum/furnace-web@${{ steps.build.outputs.digest }}" | jq '(.referrers // .manifests // []) | length')
          test "${COUNT}" -ge 1
