name: Release

on:
  workflow_dispatch:

permissions:
  contents: write   # upload release assets
  id-token: write   # OIDC token for Sigstore keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/go-sum/furnace/internal/cli.Version=${{ github.ref_name }}" \
            -o furnace-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/furnace

      - name: Sign binary
        run: |
          cosign sign-blob --yes \
            --bundle furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle \
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle

  compose-assets:
    runs-on: ubuntu-latest
    outputs:
      compose_digest: ${{ steps.package.outputs.compose_digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Package compose asset
        id: package
        run: |
          tar -czf furnace-web-compose.tgz -C docker/compose .
          echo "compose_digest=sha256:$(sha256sum furnace-web-compose.tgz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Sign compose asset
        run: |
          cosign sign-blob --yes \
            --bundle furnace-web-compose.tgz.bundle \
            furnace-web-compose.tgz

      - name: Upload compose assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            furnace-web-compose.tgz
            furnace-web-compose.tgz.bundle

  furnace-web-assets:
    runs-on: ubuntu-latest
    needs:
      - compose-assets
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Build image archive
        run: |
          docker buildx build \
            --platform linux/${{ matrix.goarch }} \
            --build-arg VERSION=${{ github.ref_name }} \
            --tag ghcr.io/go-sum/furnace-web:${{ github.ref_name }} \
            --output type=docker,dest=furnace-web-linux-${{ matrix.goarch }}-image.tar \
            .

      - name: Create metadata
        run: |
          IMAGE_ASSET="furnace-web-linux-${{ matrix.goarch }}-image.tar"
          IMAGE_DIGEST="sha256:$(sha256sum "${IMAGE_ASSET}" | cut -d' ' -f1)"
          cat > "furnace-web-linux-${{ matrix.goarch }}-metadata.json" <<EOF
          {
            "version": 1,
            "tag": "${{ github.ref_name }}",
            "image": "ghcr.io/go-sum/furnace-web:${{ github.ref_name }}",
            "image_digest": "${IMAGE_DIGEST}",
            "compose_digest": "${{ needs.compose-assets.outputs.compose_digest }}",
            "image_asset": "${IMAGE_ASSET}",
            "compose_asset": "furnace-web-compose.tgz"
          }
          EOF

      - name: Sign image archive and metadata
        run: |
          cosign sign-blob --yes \
            --bundle furnace-web-linux-${{ matrix.goarch }}-image.tar.bundle \
            furnace-web-linux-${{ matrix.goarch }}-image.tar
          cosign sign-blob --yes \
            --bundle furnace-web-linux-${{ matrix.goarch }}-metadata.json.bundle \
            furnace-web-linux-${{ matrix.goarch }}-metadata.json

      - name: Upload furnace-web assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            furnace-web-linux-${{ matrix.goarch }}-image.tar
            furnace-web-linux-${{ matrix.goarch }}-image.tar.bundle
            furnace-web-linux-${{ matrix.goarch }}-metadata.json
            furnace-web-linux-${{ matrix.goarch }}-metadata.json.bundle
