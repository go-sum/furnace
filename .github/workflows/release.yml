name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        run: grep -v '^#' .versions | grep -v '^$' >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/go-sum/furnace/internal/cli.Version=${{ github.ref_name }}" \
            -o furnace-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/furnace

      - name: Sign binary
        run: |
          cosign sign-blob --yes \
            --bundle furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle \
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle

  publish-furnace-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        run: grep -v '^#' .versions | grep -v '^$' >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: oras-project/setup-oras@v2.0.0
        with:
          version: ${{ env.ORAS_VERSION }}

      - uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Log in to GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              break
            fi
            if [[ "$attempt" -eq 3 ]]; then
              echo "error: docker login to ghcr.io failed after 3 attempts" >&2
              exit 1
            fi
            sleep 5
          done

          for attempt in 1 2 3; do
            if echo "$GHCR_TOKEN" | oras login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              break
            fi
            if [[ "$attempt" -eq 3 ]]; then
              echo "error: oras login to ghcr.io failed after 3 attempts" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Build and push furnace-web image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --build-arg VERSION=${{ github.ref_name }} \
            --tag ghcr.io/go-sum/furnace-web:${{ github.ref_name }} \
            .

      - name: Push compose artifact
        run: |
          mapfile -t compose_files < <(find deploy/compose -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)
          if [[ "${#compose_files[@]}" -eq 0 ]]; then
            echo "error: no compose files found in deploy/compose" >&2
            exit 1
          fi

          compose_args=(
            oras push ghcr.io/go-sum/furnace-web:${{ github.ref_name }}-compose
            --artifact-type application/vnd.furnace.compose
          )

          for file in "${compose_files[@]}"; do
            name="$(basename "$file")"
            compose_args+=("${name}:application/yaml")
          done

          (
            cd deploy/compose
            "${compose_args[@]}"
          )

      - name: Sign and verify published refs
        env:
          IMAGE_IDENTITY_REGEXP: ^https://github\.com/${{ github.repository }}/
          WORKFLOW_REPOSITORY: ${{ github.repository }}
          WORKFLOW_REF: ${{ github.ref }}
          OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          image_ref="$(oras resolve --full-reference ghcr.io/go-sum/furnace-web:${{ github.ref_name }})"
          compose_ref="$(oras resolve --full-reference ghcr.io/go-sum/furnace-web:${{ github.ref_name }}-compose)"

          cosign sign --yes --recursive "$image_ref"
          cosign verify \
            --certificate-identity-regexp "$IMAGE_IDENTITY_REGEXP" \
            --certificate-github-workflow-repository "$WORKFLOW_REPOSITORY" \
            --certificate-github-workflow-ref "$WORKFLOW_REF" \
            --certificate-oidc-issuer "$OIDC_ISSUER" \
            "$image_ref" >/dev/null

          cosign sign --yes "$compose_ref"
          cosign verify \
            --certificate-identity-regexp "$IMAGE_IDENTITY_REGEXP" \
            --certificate-github-workflow-repository "$WORKFLOW_REPOSITORY" \
            --certificate-github-workflow-ref "$WORKFLOW_REF" \
            --certificate-oidc-issuer "$OIDC_ISSUER" \
            "$compose_ref" >/dev/null
