name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # upload release assets
  id-token: write   # OIDC token for Sigstore keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/go-sum/furnace/internal/cli.Version=${{ github.ref_name }}" \
            -o furnace-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/furnace

      - name: Sign binary
        run: |
          cosign sign-blob --yes \
            --bundle furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle \
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}
            furnace-${{ matrix.goos }}-${{ matrix.goarch }}.bundle
