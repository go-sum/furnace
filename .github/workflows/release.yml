name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/go-sum/furnace/internal/cli.Version=${{ github.ref_name }}" \
            -o furnace-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/furnace

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: furnace-${{ matrix.goos }}-${{ matrix.goarch }}
